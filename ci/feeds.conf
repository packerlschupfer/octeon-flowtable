# Pinned OpenWrt feeds for the reproducible image build (see .github/workflows/build-image.yml).
# NOTE: scripts/feeds strips '#<text>' but NOT a lone '#' line — keep every comment
# line non-empty after the hash, no bare '#' separators, or feeds errors "Syntax error".
# `packages` covers the lean image (conntrack, tcpdump, libnetfilter-*); `luci` covers
# the 'router' variant (LuCI web UI + luci-proto-wireguard). A feed being available does
# not bloat a build — only the packages each config.seed selects get built — so both
# feeds are listed for both variants. routing/telephony are omitted.
# The octeon-flowtable package is added as a `src-link` feed pointing at this repo; the
# workflow appends that line at run time (it needs an absolute path).
# Revisions are pinned to the tree the driver was validated against (OpenWrt main @
# 84f4f77, 2026-06-03, kernel 6.18.34). Bump these together with OPENWRT_REF.
src-git packages https://git.openwrt.org/feed/packages.git^879887f3d8312f2172fa4d36e9cef086f71db5c5
src-git luci https://git.openwrt.org/project/luci.git^8dd088d4b3f129a55c3dd18868823b09396d0d3a
